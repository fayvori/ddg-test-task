---
# Available releases: https://github.com/prometheus/node_exporter/releases/
node_exporter_version: "1.11.1"
node_exporter_repo: "prometheus/node_exporter"

node_exporter_arch: "amd64"
node_exporter_os: "{{ ansible_facts['system'] | lower }}"
node_exporter_download_url: "https://github.com/{{ node_exporter_repo }}/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-{{ node_exporter_arch }}.tar.gz"

node_exporter_unarchived_dir: "node_exporter-{{ node_exporter_version }}.{{ node_exporter_os }}-{{ node_exporter_arch }}"
node_exporter_unarchived_filename: "{{ node_exporter_unarchived_dir }}/node_exporter"

node_exporter_binary_path: "/usr/local/bin/node_exporter"

node_exporter_web_listen_address: "0.0.0.0:9100"
node_exporter_web_telemetry_path: "/metrics"

node_exporter_web_disable_exporter_metrics: false

node_exporter_log_level: "info"
node_exporter_log_format: "logfmt"

node_exporter_enabled_collectors:
  - systemd

node_exporter_disabled_collectors: []

node_exporter_system_group: "node-exporter"
node_exporter_system_user: "{{ node_exporter_system_group }}"

node_exporter_systemd_service_state: "started"
node_exporter_systemd_service_enabled: true

# Local path to stash the archive and its extraction
node_exporter_local_cache_path: "/tmp/node_exporter-{{ node_exporter_os }}-{{ node_exporter_arch }}/{{ node_exporter_version }}"
